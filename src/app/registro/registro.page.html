<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center">Crear Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center">
  <div class="login-logo ion-margin-bottom">
    <ion-icon name="person-add-outline" style="font-size: 96px; color: var(--ion-color-primary);"></ion-icon>
  </div>

  <form [formGroup]="formularioregistro" (ngSubmit)="registrar()">
    <ion-list lines="none">
      
      <ion-item class="ion-margin-bottom custom-input">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input 
          type="text" 
          placeholder="Nombre completo" 
          formControlName="nombre">
        </ion-input>
      </ion-item>

      <ion-item class="ion-margin-bottom custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input 
          type="email" 
          placeholder="Correo electrónico" 
          inputmode="email"
          formControlName="email">
        </ion-input>
      </ion-item>
      <div class="error-container ion-text-start ion-padding-start" 
           *ngIf="formularioregistro.get('email')?.touched && formularioregistro.get('email')?.invalid">
        <ion-text color="danger"><small>Ingresa un correo electrónico válido.</small></ion-text>
      </div>

      <ion-item class="ion-margin-bottom custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input 
          type="password" 
          placeholder="Contraseña (mín. 6 caracteres)" 
          formControlName="password">
        </ion-input>
      </ion-item>

      <ion-item class="ion-margin-bottom custom-input">
        <ion-icon name="lock-check-outline" slot="start"></ion-icon>
        <ion-input 
          type="password" 
          placeholder="Confirmar contraseña" 
          formControlName="confirmPassword">
        </ion-input>
      </ion-item>
      <div class="error-container ion-text-start ion-padding-start" 
           *ngIf="formularioregistro.hasError('mismatch') && formularioregistro.get('confirmPassword')?.touched">
        <ion-text color="danger"><small>Las contraseñas no coinciden.</small></ion-text>
      </div>

    </ion-list>

    <ion-button expand="block" shape="round" type="submit" [disabled]="formularioregistro.invalid" class="ion-margin-top">
      Registrarse
    </ion-button>
  </form>

  <div class="ion-margin-top">
    <p>¿Ya tienes una cuenta? <ion-text color="primary" routerLink="/login" style="cursor: pointer; font-weight: bold;">Inicia sesión</ion-text></p>
  </div>
</ion-content>
